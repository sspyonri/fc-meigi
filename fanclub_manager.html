<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC名義管理</title>
<style>
/* ===== ロック画面 ===== */
#lock-screen { position:fixed;inset:0;background:#2d1f3d;display:flex;align-items:center;justify-content:center;z-index:9999; }
#lock-box { background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4); }
#lock-box h1 { font-size:20px;color:#9b72b0;margin-bottom:6px; }
#lock-box p  { font-size:13px;color:#888;margin-bottom:24px; }
#lock-input  { width:100%;padding:12px;border:2px solid #e8e0ee;border-radius:8px;font-size:16px;text-align:center;letter-spacing:2px;margin-bottom:12px; }
#lock-input:focus { outline:none;border-color:#9b72b0; }
#lock-btn   { width:100%;padding:12px;background:#9b72b0;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer; }
#lock-btn:hover { background:#7a5490; }
#lock-error { color:#e05c5c;font-size:13px;margin-top:10px;min-height:18px; }

/* ===== ベース ===== */
:root {
  --primary:#c8a2c8; --primary-dark:#9b72b0;
  --danger:#e05c5c; --warning:#e8a840; --success:#5caa7a;
  --bg:#faf8fc; --card:#fff; --border:#e8e0ee; --text:#333; --muted:#888;
}
* { box-sizing:border-box;margin:0;padding:0; }
body { font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px; }

nav { background:var(--primary-dark);color:#fff;display:flex;overflow-x:auto; }
nav button { background:none;border:none;color:#fff;padding:14px 18px;cursor:pointer;white-space:nowrap;font-size:14px;border-bottom:3px solid transparent; }
nav button:hover { background:rgba(255,255,255,.15); }
nav button.active { border-bottom-color:#fff;background:rgba(255,255,255,.1); }

.page { display:none;padding:16px;max-width:900px;margin:0 auto; }
.page.active { display:block; }

h2 { font-size:18px;margin-bottom:14px;color:var(--primary-dark); }
h3 { font-size:14px;margin-bottom:8px;color:#555; }

.card { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px; }

.badge { display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:bold; }
.badge-申込中     { background:#e8f0fe;color:#3b6fd4; }
.badge-初期当選   { background:#e6f4ed;color:var(--success); }
.badge-復活当選   { background:#d4f0e8;color:#2e8b6e; }
.badge-制作解放   { background:#e8f5e9;color:#388e3c; }
.badge-制作解放落選 { background:#fce8e8;color:#c0392b; }
.badge-落選     { background:#fde8e8;color:var(--danger); }
.badge-補欠     { background:#fef3e2;color:var(--warning); }
.badge-番協     { background:#f0e8fe;color:#7b4fd4; }
.badge-未定     { background:#eee;color:var(--muted); }
.badge-warn   { background:#fef3e2;color:var(--warning); }
.badge-danger { background:#fde8e8;color:var(--danger); }

.form-group { margin-bottom:10px; }
label { display:block;font-size:11px;color:var(--muted);margin-bottom:3px; }
input,select,textarea { width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--bg); }
textarea { resize:vertical;height:56px; }
input:focus,select:focus,textarea:focus { outline:none;border-color:var(--primary); }
.pw-wrap { position:relative; }
.pw-wrap input { padding-right:36px; }
.pw-eye { position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;width:auto; }

.form-row   { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
.form-row-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px; }

.btn { padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit; }
.btn:hover { opacity:.85; }
.btn-primary { background:var(--primary-dark);color:#fff; }
.btn-success { background:var(--success);color:#fff; }
.btn-danger  { background:var(--danger);color:#fff; }
.btn-sm      { padding:4px 10px;font-size:12px; }
.btn-outline { background:none;border:1px solid var(--border); }
.btn-bar     { display:flex;gap:8px;margin-top:14px;flex-wrap:wrap; }

.alert-box        { padding:10px 14px;border-radius:8px;margin-bottom:10px; }
.alert-box.warn   { background:#fef3e2;border-left:4px solid var(--warning); }
.alert-box.danger { background:#fde8e8;border-left:4px solid var(--danger); }

.modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:#fff;border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto; }
.modal > h3 { margin-bottom:14px;color:var(--primary-dark);font-size:16px; }

.stats { display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px; }
.stat-card { background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center; }
.stat-num  { font-size:26px;font-weight:bold;color:var(--primary-dark); }
.stat-lbl  { font-size:11px;color:var(--muted);margin-top:3px; }

.toolbar { display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px; }
.empty   { text-align:center;color:var(--muted);padding:36px 16px; }

.section-divider { display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:20px; }
.section-divider .label { font-size:16px;font-weight:bold;color:var(--primary-dark);white-space:nowrap; }
.section-divider .line  { flex:1;height:2px;background:var(--primary);opacity:.35;border-radius:2px; }

.member-section { padding-left:12px;border-left:3px solid var(--border);margin-bottom:14px; }
.member-header  { display:flex;align-items:center;gap:8px;margin-bottom:8px; }

/* 申込中イベント表示 */
.event-row { display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f5f0fa;border-radius:8px;margin-top:6px;flex-wrap:wrap; }
.event-info { flex:1;min-width:0; }
.event-name { font-size:13px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.event-sub  { font-size:11px;color:var(--muted);margin-top:1px; }
.event-btns { display:flex;gap:6px;flex-shrink:0; }
.btn-win  { background:#e6f4ed;color:var(--success);border:1px solid var(--success);padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:bold; }
.btn-lose { background:#fde8e8;color:var(--danger);border:1px solid var(--danger);padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:bold; }
.btn-win:hover  { background:var(--success);color:#fff; }
.btn-lose:hover { background:var(--danger);color:#fff; }

/* 履歴 */
.hist-record { display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:6px; }
.hist-info   { flex:1; }
.hist-inline { background:#f5f0fa;border-radius:8px;padding:14px;margin-top:8px; }

.section-toggle { display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 0;color:var(--muted);font-size:13px;user-select:none; }
.section-toggle:hover { color:var(--text); }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lock-screen">
  <div id="lock-box">
    <h1>FC名義管理</h1>
    <p id="lock-desc">パスワードを入力してください</p>
    <input type="password" id="lock-input" placeholder="パスワード" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')lockSubmit()">
    <button id="lock-btn" onclick="lockSubmit()">開く</button>
    <div id="lock-error"></div>
  </div>
</div>

<nav>
  <button id="nav-dashboard" class="active" onclick="showPage('dashboard',this)">ダッシュボード</button>
  <button id="nav-meigi"     onclick="showPage('meigi',this)">名義管理</button>
  <button id="nav-venue"     onclick="showPage('venue',this)">会場管理</button>
  <button style="margin-left:auto;" onclick="openDataModal()">⚙ データ</button>
</nav>

<!-- ダッシュボード -->
<div id="page-dashboard" class="page active">
  <h2>ダッシュボード</h2>
  <div class="stats" id="stats"></div>
  <div id="renewal-alerts"></div>
  <div id="recent-history"></div>
</div>

<!-- 名義管理 -->
<div id="page-meigi" class="page">
  <div class="toolbar">
    <h2 style="margin:0">名義管理</h2>
    <button class="btn btn-primary" onclick="openMeigiModal(null,'','')">＋ 名義を追加</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <select id="sort-meigi" onchange="renderMeigi()" style="width:auto;min-width:180px;">
      <option value="new">登録が新しい順</option>
      <option value="old">登録が古い順</option>
      <option value="applying">申込み中の名義</option>
      <option value="win-rate">当選率が高い順</option>
      <option value="last-win">前回当選した名義</option>
      <option value="last-lose">前回落選した名義</option>
    </select>
    <select id="filter-group" onchange="renderMeigi()" style="width:auto;min-width:130px;">
      <option value="">グループ：すべて</option>
    </select>
  </div>
  <div id="meigi-list"></div>
</div>

<!-- 会場管理 -->
<div id="page-venue" class="page">
  <div class="toolbar">
    <h2 style="margin:0">会場管理</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" onclick="openPresetModal()">Travis Japan 会場プリセット</button>
      <button class="btn btn-primary" onclick="openVenueModal(null)">＋ 会場を追加</button>
    </div>
  </div>
  <div id="venue-list"></div>
</div>

<!-- ===== モーダル：名義 ===== -->
<div class="modal-overlay" id="modal-meigi">
  <div class="modal">
    <h3 id="meigi-modal-title">名義を追加</h3>
    <input type="hidden" id="meigi-id">

    <div class="form-group">
      <label>名義名 *</label>
      <input type="text" id="meigi-name" placeholder="例：田中さや子">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>担当グループ</label>
        <input type="text" id="meigi-group" list="group-datalist" autocomplete="off"
               placeholder="例：Travis Japan" oninput="updateMemberDatalist()">
        <datalist id="group-datalist"></datalist>
      </div>
      <div class="form-group">
        <label>メンバー</label>
        <input type="text" id="meigi-member" list="member-datalist" autocomplete="off"
               placeholder="例：宮近海斗">
        <datalist id="member-datalist"></datalist>
      </div>
    </div>

    <!-- FC情報 -->
    <div class="form-row">
      <div class="form-group">
        <label>会員番号</label>
        <input type="text" id="meigi-number" placeholder="例：0000000000">
      </div>
      <div class="form-group">
        <label>パスワード（FCサイト）</label>
        <div class="pw-wrap">
          <input type="password" id="meigi-password" placeholder="パスワード">
          <button class="pw-eye" type="button" onclick="togglePw('meigi-password',this)">👁</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>入会年月</label>
        <input type="month" id="meigi-join-month">
      </div>
      <div class="form-group">
        <label>会員有効期限</label>
        <input type="date" id="meigi-valid-until">
      </div>
    </div>
    <div class="form-group">
      <label>年会費更新日</label>
      <input type="date" id="meigi-renewal">
    </div>

    <!-- 個人情報（折りたたみ） -->
    <div class="section-toggle" onclick="toggleSection('personal-info',this)">
      <span id="personal-arrow">▶</span> 個人情報
    </div>
    <div id="personal-info" style="display:none;">
      <div class="form-row">
        <div class="form-group">
          <label>氏名</label>
          <input type="text" id="meigi-realname" placeholder="例：山田 花子">
        </div>
        <div class="form-group">
          <label>生年月日</label>
          <input type="date" id="meigi-birthday">
        </div>
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="meigi-email" placeholder="例：example@mail.com">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>電話番号</label>
          <input type="tel" id="meigi-phone" placeholder="例：090-0000-0000">
        </div>
        <div class="form-group">
          <label>好きなアーティスト</label>
          <input type="text" id="meigi-artist" placeholder="例：宮近海斗">
        </div>
      </div>
      <div class="form-group">
        <label>住所</label>
        <input type="text" id="meigi-address" placeholder="例：東京都渋谷区...">
      </div>
    </div>

    <div class="form-group" style="margin-top:8px;">
      <label>メモ</label>
      <textarea id="meigi-note" placeholder="備考など"></textarea>
    </div>

    <div class="btn-bar">
      <button class="btn btn-primary" onclick="saveMeigi()">保存</button>
      <button class="btn btn-outline" onclick="closeModal('modal-meigi')">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="meigi-delete-btn" onclick="deleteMeigi()" style="margin-left:auto;display:none;">削除</button>
    </div>

    <!-- 申込み・当選歴（編集時のみ） -->
    <div id="meigi-history-section" style="display:none;">
      <hr style="margin:18px 0;border:none;border-top:2px solid var(--border);">
      <h3 style="margin-bottom:10px;font-size:15px;color:var(--primary-dark);">申込み・当選歴</h3>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <button id="ytab-2023" class="btn btn-outline btn-sm" onclick="setHistoryYear(2023)">2023年</button>
        <button id="ytab-2024" class="btn btn-outline btn-sm" onclick="setHistoryYear(2024)">2024年</button>
        <button id="ytab-2025" class="btn btn-outline btn-sm" onclick="setHistoryYear(2025)">2025年</button>
        <button id="ytab-2026" class="btn btn-outline btn-sm" onclick="setHistoryYear(2026)">2026年</button>
      </div>
      <div id="history-year-content"></div>
    </div>
  </div>
</div>

<!-- ===== モーダル：データ管理 ===== -->
<div class="modal-overlay" id="modal-data">
  <div class="modal">
    <h3>データ管理</h3>

    <div style="margin-bottom:20px;">
      <h4 style="font-size:13px;color:var(--primary-dark);margin-bottom:8px;">📤 エクスポート（PCからスマホへ）</h4>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">全データをJSONファイルとしてダウンロードします。スマホでインポートすることでデータを同期できます。</p>
      <button class="btn btn-primary" onclick="exportData()">データをダウンロード</button>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">

    <div style="margin-bottom:20px;">
      <h4 style="font-size:13px;color:var(--primary-dark);margin-bottom:8px;">📥 インポート（スマホへ読み込む）</h4>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">エクスポートしたJSONファイルを読み込みます。<strong style="color:var(--danger);">現在のデータは上書きされます。</strong></p>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-outline" onclick="document.getElementById('import-file').click()">JSONファイルを選択</button>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">

    <div>
      <h4 style="font-size:13px;color:var(--muted);margin-bottom:8px;">🔑 パスワード変更</h4>
      <div class="form-group">
        <label>新しいパスワード</label>
        <input type="password" id="new-pw" placeholder="4文字以上">
      </div>
      <button class="btn btn-outline btn-sm" onclick="changePw()">パスワードを変更</button>
    </div>

    <div class="btn-bar" style="margin-top:20px;">
      <button class="btn btn-outline" onclick="closeModal('modal-data')">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：会場プリセット ===== -->
<div class="modal-overlay" id="modal-preset">
  <div class="modal">
    <h3>Travis Japan 会場プリセット</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">ツアーごとに会場をまとめて追加できます。重複はスキップされます。</p>

    <div id="preset-tour-list"></div>

    <div class="btn-bar">
      <button class="btn btn-primary" onclick="addPresetByTour('all')">すべて一括追加</button>
      <button class="btn btn-outline" onclick="closeModal('modal-preset')">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== モーダル：会場 ===== -->
<div class="modal-overlay" id="modal-venue">
  <div class="modal">
    <h3 id="venue-modal-title">会場を追加</h3>
    <input type="hidden" id="venue-id">
    <div class="form-group">
      <label>会場名</label>
      <input type="text" id="venue-name" placeholder="例：東京ドーム">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>都道府県</label>
        <input type="text" id="venue-pref" placeholder="例：東京都">
      </div>
      <div class="form-group">
        <label>収容人数（任意）</label>
        <input type="number" id="venue-cap" placeholder="例：55000">
      </div>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="venue-note" placeholder="ブロック構成・アクセスなど"></textarea>
    </div>
    <div class="btn-bar">
      <button class="btn btn-primary" onclick="saveVenue()">保存</button>
      <button class="btn btn-outline" onclick="closeModal('modal-venue')">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="venue-delete-btn" onclick="deleteVenue()" style="margin-left:auto;display:none;">削除</button>
    </div>
  </div>
</div>

<script>
// ===== パスワードロック =====
async function sha256(t) {
  var b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}
async function lockInit() {
  if (!localStorage.getItem('pw_hash')) {
    document.getElementById('lock-desc').textContent = '初回設定：パスワードを決めてください';
    document.getElementById('lock-btn').textContent  = '設定して開く';
    document.getElementById('lock-btn').onclick = lockSetup;
    document.getElementById('lock-input').onkeydown = function(e){if(e.key==='Enter')lockSetup();};
  }
  if (sessionStorage.getItem('unlocked')==='1') hideLock();
}
async function lockSetup() {
  var pw = document.getElementById('lock-input').value;
  if (pw.length < 4) { document.getElementById('lock-error').textContent='4文字以上で設定してください'; return; }
  localStorage.setItem('pw_hash', await sha256(pw));
  sessionStorage.setItem('unlocked','1'); hideLock();
}
async function lockSubmit() {
  var h = await sha256(document.getElementById('lock-input').value);
  if (h === localStorage.getItem('pw_hash')) { sessionStorage.setItem('unlocked','1'); hideLock(); }
  else { document.getElementById('lock-error').textContent='パスワードが違います'; document.getElementById('lock-input').value=''; document.getElementById('lock-input').focus(); }
}
function hideLock() { document.getElementById('lock-screen').style.display='none'; }
lockInit();

// ===== DB =====
var DB = {
  get: function(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } },
  set: function(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
};
function uuid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== ナビ =====
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='meigi')     renderMeigi();
  if(name==='venue')     renderVenue();
}

// ===== モーダル =====
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click',function(e){ if(e.target===o) o.classList.remove('open'); });
});

function togglePw(inputId, btn) {
  var el = document.getElementById(inputId);
  el.type = el.type==='password' ? 'text' : 'password';
}
function toggleSection(id, el) {
  var sec = document.getElementById(id);
  var arrow = el.querySelector('span');
  var open = sec.style.display === '';
  sec.style.display = open ? 'none' : '';
  if(arrow) arrow.textContent = open ? '▶' : '▼';
}

// ===== バッジ =====
var WIN_RESULTS  = ['初期当選','復活当選','制作解放'];
var LOSE_RESULTS = ['落選','制作解放落選'];

function resultBadge(r) {
  var cls = r ? r.replace(/\s/g,'') : '未定';
  return '<span class="badge badge-'+cls+'">'+(r||'未定')+'</span>';
}
function renewalBadge(renewal, today) {
  if (!renewal) return '';
  var d = new Date(renewal); d.setHours(0,0,0,0);
  var diff = Math.round((d-today)/86400000);
  if (diff < 0)        return '<span class="badge badge-danger">更新超過</span>';
  if (diff <= 60)      return '<span class="badge badge-warn">あと'+diff+'日</span>';
  return '';
}

// ===== ダッシュボード =====
function renderDashboard() {
  var list = DB.get('meigi');
  var today = new Date(); today.setHours(0,0,0,0);

  var totalHistory = 0, wins = 0, applying = 0;
  list.forEach(function(m) {
    var h = m.history || [];
    totalHistory += h.length;
    wins    += h.filter(function(r){return r.result==='当選';}).length;
    applying += h.filter(function(r){return r.result==='申込中';}).length;
  });
  var rate = totalHistory ? Math.round(wins/totalHistory*100) : 0;

  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">'+list.length+'</div><div class="stat-lbl">名義数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+applying+'</div><div class="stat-lbl">申込み中</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+wins+'</div><div class="stat-lbl">当選数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+rate+'%</div><div class="stat-lbl">当選率</div></div>';

  // 更新アラート
  var alerts = list.filter(function(m){
    if (!m.renewal) return false;
    var d=new Date(m.renewal); d.setHours(0,0,0,0);
    return (d-today)/86400000 <= 60;
  }).sort(function(a,b){return new Date(a.renewal)-new Date(b.renewal);});
  var ah = '';
  if (alerts.length) {
    ah = '<h3 style="margin-bottom:8px;">更新が近い名義</h3>';
    alerts.forEach(function(m){
      var d=new Date(m.renewal); d.setHours(0,0,0,0);
      var diff=Math.round((d-today)/86400000);
      var cls=diff<0?'danger':'warn';
      var lbl=diff<0?(-diff)+'日超過':diff===0?'本日':'あと'+diff+'日';
      ah+='<div class="alert-box '+cls+'"><strong>'+esc(m.name)+'</strong>（'+esc(m.group||'—')+'）'+
        '　更新日：'+m.renewal+'　<span class="badge badge-'+(diff<0?'danger':'warn')+'">'+lbl+'</span>'+
        '</div>';
    });
  }
  document.getElementById('renewal-alerts').innerHTML = ah;

  // 最近の申込み
  var recent = [];
  list.forEach(function(m){
    (m.history||[]).forEach(function(r){
      recent.push({meigiName:m.name, group:m.group, concert:r.concert, area:r.area, date:r.date, result:r.result});
    });
  });
  recent.sort(function(a,b){return (b.date||'')>(a.date||'')?1:-1;});
  recent = recent.slice(0,6);
  var rh = '';
  if (recent.length) {
    rh = '<h3 style="margin:16px 0 8px;">最近の申込み履歴</h3><div class="card" style="padding:0;overflow:hidden;"><table style="width:100%;border-collapse:collapse;">';
    rh += '<thead><tr style="font-size:12px;color:var(--muted);"><th style="padding:8px 12px;">公演</th><th>名義</th><th>エリア</th><th>日付</th><th>結果</th></tr></thead><tbody>';
    recent.forEach(function(r){
      rh += '<tr style="border-top:1px solid var(--border);">'+
        '<td style="padding:8px 12px;">'+esc(r.concert)+'</td>'+
        '<td>'+esc(r.meigiName)+'</td>'+
        '<td>'+esc(r.area||'—')+'</td>'+
        '<td>'+esc(r.date||'—')+'</td>'+
        '<td>'+resultBadge(r.result)+'</td></tr>';
    });
    rh += '</tbody></table></div>';
  }
  document.getElementById('recent-history').innerHTML = rh;
}

// ===== 名義管理 =====
function getGroups() {
  var seen=[];
  DB.get('meigi').forEach(function(m){var g=(m.group||'').trim();if(g&&seen.indexOf(g)<0)seen.push(g);});
  return seen;
}
function getMembersForGroup(g) {
  var seen=[];
  DB.get('meigi').forEach(function(m){
    if((m.group||'').trim()!==g)return;
    var mb=(m.member||'').trim();if(mb&&seen.indexOf(mb)<0)seen.push(mb);
  });
  return seen;
}
function updateMemberDatalist() {
  var g=document.getElementById('meigi-group').value.trim();
  document.getElementById('member-datalist').innerHTML=getMembersForGroup(g).map(function(mb){return '<option value="'+esc(mb)+'">';}).join('');
}

function isWin(result)  { return WIN_RESULTS.indexOf(result)  >= 0; }
function isLose(result) { return LOSE_RESULTS.indexOf(result) >= 0; }

function winRate(m) {
  var h = m.history || [];
  var decided = h.filter(function(r){ return isWin(r.result) || isLose(r.result); });
  if (!decided.length) return -1;
  return h.filter(function(r){ return isWin(r.result); }).length / decided.length;
}
function lastResult(m) {
  var h = (m.history||[]).filter(function(r){ return isWin(r.result) || isLose(r.result); });
  if (!h.length) return null;
  var last = h.sort(function(a,b){ return (b.date||'')>(a.date||'')?1:-1; })[0].result;
  return isWin(last) ? '当選' : '落選';
}

function renderMeigi() {
  var list  = DB.get('meigi');
  var today = new Date(); today.setHours(0,0,0,0);
  var sort  = document.getElementById('sort-meigi').value;
  var gf    = document.getElementById('filter-group').value;

  // グループフィルター更新
  var groups = getGroups();
  var gfEl   = document.getElementById('filter-group');
  var gfCur  = gfEl.value;
  gfEl.innerHTML = '<option value="">グループ：すべて</option>' +
    groups.map(function(g){return '<option value="'+esc(g)+'">'+esc(g)+'</option>';}).join('');
  gfEl.value = gfCur;

  if (gf) list = list.filter(function(m){return (m.group||'').trim()===gf;});

  // 並び替え
  if (sort==='applying') {
    list = list.filter(function(m){return (m.history||[]).some(function(r){return r.result==='申込中';});});
  } else if (sort==='win-rate') {
    list = list.slice().sort(function(a,b){return winRate(b)-winRate(a);});
  } else if (sort==='last-win') {
    list = list.filter(function(m){return lastResult(m)==='当選';});
  } else if (sort==='last-lose') {
    list = list.filter(function(m){return lastResult(m)==='落選';});
  } else if (sort==='old') {
    // 登録順（idはタイムスタンプベース）は元の配列順
  } else {
    list = list.slice().reverse();
  }

  if (!list.length) {
    document.getElementById('meigi-list').innerHTML = '<div class="empty">条件に合う名義がありません</div>';
    return;
  }

  var allGroups = getGroups();
  var ungrouped = list.filter(function(m){return !(m.group||'').trim();});
  var html = '';

  allGroups.forEach(function(g) {
    var inGroup = list.filter(function(m){return (m.group||'').trim()===g;});
    if (!inGroup.length) return;

    html += '<div style="margin-bottom:24px;">';
    html += '<div class="section-divider"><span class="label">'+esc(g)+'</span><div class="line"></div>'+
      '<button class="btn btn-primary btn-sm" onclick="openMeigiModal(null,\''+esc(g)+'\',\'\')">＋ 追加</button></div>';
    inGroup.forEach(function(m){ html += meigiCard(m,today); });
    html += '</div>';
  });

  if (ungrouped.length) {
    html += '<div style="margin-bottom:20px;"><div class="section-divider"><span class="label" style="color:var(--muted);">グループ未設定</span><div class="line"></div></div>';
    ungrouped.forEach(function(m){ html += meigiCard(m,today); });
    html += '</div>';
  }

  document.getElementById('meigi-list').innerHTML = html;
}

function meigiCard(m, today) {
  var rbadge = renewalBadge(m.renewal, today);
  var applying = (m.history||[]).filter(function(r){return r.result==='申込中';});
  var rate = winRate(m);
  var rateStr = rate>=0 ? Math.round(rate*100)+'%' : '—';

  var html = '<div class="card" style="margin-bottom:8px;">'+
    '<div style="display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="openMeigiModal(\''+m.id+'\',\'\',\'\')">'+
    '<strong style="font-size:15px;flex:1;">'+esc(m.name)+'</strong>'+
    (rbadge?rbadge:'')+
    '<span style="font-size:12px;color:var(--muted);">当選率 '+rateStr+'</span>'+
    '</div>'+
    '<div style="margin-top:4px;font-size:12px;color:var(--muted);">'+
    (m.number?'会員番号：'+esc(m.number)+'　':'')+
    (m.renewal?'更新日：'+m.renewal:'')+
    '</div>';

  // 申込中イベント
  if (applying.length) {
    applying.forEach(function(r){
      html += '<div class="event-row">'+
        '<div class="event-info">'+
        '<div class="event-name">'+esc(r.concert)+'</div>'+
        '<div class="event-sub">'+esc(r.area||'')+(r.date?'　'+r.date:'')+'</div>'+
        '</div>'+
        resultBadge(r.result)+
        '<div class="event-btns">'+
        '<button class="btn-win" onclick="quickResult(\''+m.id+'\',\''+r.id+'\',\'初期当選\')">🎉 初期</button>'+
        '<button class="btn-win" style="background:#d4f0e8;color:#2e8b6e;border-color:#2e8b6e;" onclick="quickResult(\''+m.id+'\',\''+r.id+'\',\'復活当選\')">🔄 復活</button>'+
        '<button class="btn-lose" onclick="quickResult(\''+m.id+'\',\''+r.id+'\',\'落選\')">💔 落選</button>'+
        '</div></div>';
    });
  }

  html += '</div>';
  return html;
}

function quickResult(meigiId, recordId, result) {
  var list = DB.get('meigi');
  var mIdx = list.findIndex(function(x){return x.id===meigiId;});
  if (mIdx<0) return;
  var h = list[mIdx].history || [];
  var rIdx = h.findIndex(function(x){return x.id===recordId;});
  if (rIdx<0) return;
  h[rIdx].result = result;
  list[mIdx].history = h;
  DB.set('meigi', list);
  renderMeigi();
}

  var g = preGroup || '';
  var fields = ['id','name','group','member','number','password','join-month','valid-until','renewal','fee','realname','birthday','email','phone','artist','address','note'];
  fields.forEach(function(f){
    var el = document.getElementById('meigi-'+f);
    if(el) el.value = '';
  });

  document.getElementById('meigi-member').value = preMember || '';
  document.getElementById('member-datalist').innerHTML = getMembersForGroup(g).map(function(mb){return '<option value="'+esc(mb)+'">';}).join('');

  document.getElementById('meigi-modal-title').textContent = '名義を追加';
  document.getElementById('meigi-delete-btn').style.display = 'none';
  document.getElementById('meigi-history-section').style.display = 'none';
  // 個人情報は閉じる
  document.getElementById('personal-info').style.display = 'none';
  document.getElementById('personal-arrow').textContent = '▶';

  if (id) {
    var m = DB.get('meigi').find(function(x){return x.id===id;});

    document.getElementById('meigi-id').value         = m.id           || '';
    document.getElementById('meigi-name').value       = m.name         || '';
    document.getElementById('meigi-group').value      = m.group        || '';
    document.getElementById('meigi-member').value     = m.member       || '';
    document.getElementById('meigi-number').value     = m.number       || '';
    document.getElementById('meigi-password').value   = m.password     || '';
    document.getElementById('meigi-join-month').value = m.joinMonth    || '';
    document.getElementById('meigi-valid-until').value= m.validUntil   || '';
    document.getElementById('meigi-renewal').value    = m.renewal      || '';
    document.getElementById('meigi-realname').value   = m.realName     || '';
    document.getElementById('meigi-birthday').value   = m.birthday     || '';
    document.getElementById('meigi-email').value      = m.email        || '';
    document.getElementById('meigi-phone').value      = m.phone        || '';
    document.getElementById('meigi-artist').value     = m.favoriteArtist|| '';
    document.getElementById('meigi-address').value    = m.address      || '';
    document.getElementById('meigi-note').value       = m.note         || '';
    document.getElementById('member-datalist').innerHTML = getMembersForGroup(m.group||'').map(function(mb){return '<option value="'+esc(mb)+'">';}).join('');

    document.getElementById('meigi-delete-btn').style.display = '';
    document.getElementById('meigi-history-section').style.display = '';
    setHistoryYear(currentHistoryYear);
  }
  openModal('modal-meigi');
}

function saveMeigi() {
  var name = document.getElementById('meigi-name').value.trim();
  if (!name) { alert('名義名を入力してください'); return; }
  var id   = document.getElementById('meigi-id').value || uuid();

  // 既存データから history を引き継ぐ
  var existing = DB.get('meigi').find(function(x){return x.id===id;});
  var obj = {
    id:             id,
    name:           name,
    group:          document.getElementById('meigi-group').value.trim(),
    member:         document.getElementById('meigi-member').value.trim(),
    number:         document.getElementById('meigi-number').value.trim(),
    password:       document.getElementById('meigi-password').value,
    joinMonth:      document.getElementById('meigi-join-month').value,
    validUntil:     document.getElementById('meigi-valid-until').value,
    renewal:        document.getElementById('meigi-renewal').value,
    realName:       document.getElementById('meigi-realname').value.trim(),
    birthday:       document.getElementById('meigi-birthday').value,
    email:          document.getElementById('meigi-email').value.trim(),
    phone:          document.getElementById('meigi-phone').value.trim(),
    favoriteArtist: document.getElementById('meigi-artist').value.trim(),
    address:        document.getElementById('meigi-address').value.trim(),
    note:           document.getElementById('meigi-note').value.trim(),
    history:        existing ? (existing.history || []) : [],
  };
  var list = DB.get('meigi');
  var idx  = list.findIndex(function(x){return x.id===id;});
  if (idx>=0) list[idx]=obj; else list.push(obj);
  DB.set('meigi', list);
  closeModal('modal-meigi');
  renderMeigi();
}

function deleteMeigi() {
  if (!confirm('この名義を削除しますか？')) return;
  var id = document.getElementById('meigi-id').value;
  DB.set('meigi', DB.get('meigi').filter(function(x){return x.id!==id;}));
  closeModal('modal-meigi');
  renderMeigi();
}

var currentHistoryYear = new Date().getFullYear();

function setHistoryYear(year) {
  currentHistoryYear = year;
  [2023,2024,2025,2026].forEach(function(y){
    var b=document.getElementById('ytab-'+y);
    if(b) b.className='btn btn-sm '+(y===year?'btn-primary':'btn-outline');
  });
  renderHistoryYear();
}

function getMeigiHistory(meigiId) {
  var m=DB.get('meigi').find(function(x){return x.id===meigiId;});
  return (m&&m.history)?m.history:[];
}

function renderHistoryYear() {
  var meigiId = document.getElementById('meigi-id').value;
  var year    = currentHistoryYear;
  var records = getMeigiHistory(meigiId).filter(function(r){return Number(r.year)===year;});

  var html = '';
  if (records.length) {
    records.forEach(function(r){
      html += '<div class="hist-record">'+
        '<div class="hist-info">'+
        '<div style="font-size:13px;font-weight:bold;">'+esc(r.concert)+'</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+
        (r.area?esc(r.area)+'　':'')+
        (r.date?r.date+'　':'')+
        (r.result==='当選'?[r.seatBlock,r.seatRow,r.seatNum].filter(Boolean).join(' '):'')+'</div>'+
        (r.requester?'<div style="font-size:11px;color:var(--muted);">依頼者：'+esc(r.requester)+'</div>':'')+
        '</div>'+
        resultBadge(r.result)+'　'+
        '<button class="btn btn-outline btn-sm" onclick="showHistoryForm(\''+r.id+'\')">編集</button>'+
        '</div>';
    });
  } else {
    html += '<div style="color:var(--muted);font-size:13px;padding:6px 0;">'+year+'年の記録はまだありません</div>';
  }
  html += '<div id="history-inline-form"></div>'+
    '<button id="hist-add-btn" class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="showHistoryForm(null)">＋ '+year+'年に追加</button>';
  document.getElementById('history-year-content').innerHTML = html;
}

  var ab = document.getElementById('hist-add-btn');
  if(ab) ab.style.display='none';

  var isWin = r && r.result==='当選';
  var opts  = ['申込中','初期当選','復活当選','制作解放','制作解放落選','落選','補欠','番協'].map(function(v){
    return '<option value="'+v+'"'+(r&&r.result===v?' selected':'')+'>'+v+'</option>';
  }).join('');

  var fh =
    '<div class="hist-inline">'+
    '<input type="hidden" id="hist-record-id" value="'+(r?r.id:'')+'">'+
    '<div class="form-group"><label>公演名 *</label>'+
    '<input type="text" id="hist-concert" value="'+esc(r?r.concert:'')+'" placeholder="例：LIVE TOUR 2025"></div>'+
    '<div class="form-row">'+
    '<div class="form-group"><label>エリア</label><input type="text" id="hist-area" value="'+esc(r?r.area||'':'')+'" placeholder="例：大阪、東京"></div>'+
    '<div class="form-group"><label>日付</label><input type="date" id="hist-date" value="'+(r?r.date||'':'')+'"></div>'+
    '</div>'+
    '<div class="form-group"><label>結果</label><select id="hist-result" onchange="toggleHistSeat()">'+opts+'</select></div>'+
    '<div class="form-group"><label>依頼者</label><input type="text" id="hist-requester" value="'+esc(r?r.requester||'':'')+'" placeholder="例：あいこ"></div>'+
    '<div id="hist-seat-fields" style="'+(isWin?'':'display:none;')+'">'+
    '<div class="form-row-3">'+
    '<div class="form-group"><label>ブロック</label><input type="text" id="hist-block" value="'+esc(r?r.seatBlock||'':'')+'" placeholder="例：1塁A"></div>'+
    '<div class="form-group"><label>列</label><input type="text" id="hist-row-s" value="'+esc(r?r.seatRow||'':'')+'" placeholder="例：12列"></div>'+
    '<div class="form-group"><label>番号</label><input type="text" id="hist-num" value="'+esc(r?r.seatNum||'':'')+'" placeholder="例：25番"></div>'+
    '</div>'+
    '<div class="form-group"><label>座席メモ</label><input type="text" id="hist-seat-note" value="'+esc(r?r.seatNote||'':'')+'" placeholder="例：花道横"></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-top:10px;">'+
    '<button class="btn btn-primary btn-sm" onclick="saveHistoryRecord()">保存</button>'+
    '<button class="btn btn-outline btn-sm" onclick="renderHistoryYear()">キャンセル</button>'+
    (r?'<button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteHistoryRecord(\''+r.id+'\')">削除</button>':'')+
    '</div></div>';

  document.getElementById('history-inline-form').innerHTML = fh;
}

function toggleHistSeat() {
  var r=document.getElementById('hist-result').value;
  var sf=document.getElementById('hist-seat-fields');
  if(sf) sf.style.display=r==='当選'?'':'none';
}

function saveHistoryRecord() {
  var concert = document.getElementById('hist-concert').value.trim();
  if (!concert) { alert('公演名を入力してください'); return; }
  var meigiId = document.getElementById('meigi-id').value;
  var list    = DB.get('meigi');
  var mIdx    = list.findIndex(function(x){return x.id===meigiId;});
  if (mIdx<0) return;
  if (!list[mIdx].history) list[mIdx].history=[];

  var recId  = document.getElementById('hist-record-id').value;
  var result = document.getElementById('hist-result').value;
  var obj = {
    id:         recId || uuid(),
    year:       currentHistoryYear,
    concert:    concert,
    area:       document.getElementById('hist-area').value.trim(),
    date:       document.getElementById('hist-date').value,
    result:     result,
    requester:  document.getElementById('hist-requester').value.trim(),
    seatBlock:  result==='当選'?document.getElementById('hist-block').value.trim():'',
    seatRow:    result==='当選'?document.getElementById('hist-row-s').value.trim():'',
    seatNum:    result==='当選'?document.getElementById('hist-num').value.trim():'',
    seatNote:   result==='当選'?document.getElementById('hist-seat-note').value.trim():'',
  };
  var hIdx = list[mIdx].history.findIndex(function(r){return r.id===obj.id;});
  if (hIdx>=0) list[mIdx].history[hIdx]=obj; else list[mIdx].history.push(obj);
  DB.set('meigi', list);
  renderHistoryYear();
  renderMeigi();  // カードの申込中表示も更新
}

function deleteHistoryRecord(recordId) {
  if (!confirm('この記録を削除しますか？')) return;
  var meigiId = document.getElementById('meigi-id').value;
  var list    = DB.get('meigi');
  var mIdx    = list.findIndex(function(x){return x.id===meigiId;});
  if (mIdx<0||!list[mIdx].history) return;
  list[mIdx].history = list[mIdx].history.filter(function(r){return r.id!==recordId;});
  DB.set('meigi', list);
  renderHistoryYear();
}

function openPresetModal() {
  var list = DB.get('venue');
  var html = '';
  TOUR_PRESETS.forEach(function(tour, ti) {
    html += '<div style="margin-bottom:16px;padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
      '<strong style="color:var(--primary-dark);">Travis Japan ' + esc(tour.tourName) + '</strong>' +
      '<button class="btn btn-primary btn-sm" onclick="addPresetByTour(' + ti + ')">このツアーを追加</button>' +
      '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    tour.venues.forEach(function(v) {
      var exists = list.some(function(x){ return x.name === v.name; });
      html += '<span style="font-size:12px;padding:3px 8px;border-radius:20px;background:' +
        (exists ? '#e6f4ed;color:var(--success)' : '#eee;color:var(--muted)') + ';">' +
        esc(v.name) + (exists ? ' ✓' : '') + '</span>';
    });
    html += '</div></div>';
  });
  document.getElementById('preset-tour-list').innerHTML = html;
  openModal('modal-preset');
}

function addPresetByTour(tourIdx) {
  var list  = DB.get('venue');
  var added = 0;
  var targets = tourIdx === 'all'
    ? TOUR_PRESETS.reduce(function(acc, t){ return acc.concat(t.venues); }, [])
    : TOUR_PRESETS[tourIdx].venues;

  targets.forEach(function(p) {
    if (!list.some(function(v){ return v.name === p.name; })) {
      list.push({ id: uuid(), name: p.name, pref: p.pref || '', cap: '', note: '' });
      added++;
    }
  });
  DB.set('venue', list);
  renderVenue();
  if (tourIdx !== 'all') openPresetModal(); // バッジ更新のため再描画
  else { closeModal('modal-preset'); alert(added + '件の会場を追加しました。'); }
}

// ===== 会場管理 =====
function renderVenue() {
  var list = DB.get('venue');
  if (!list.length) { document.getElementById('venue-list').innerHTML='<div class="empty">会場がまだありません</div>'; return; }
  var html='<div class="card" style="padding:0;overflow:hidden;"><table style="width:100%;border-collapse:collapse;">'+
    '<thead><tr style="font-size:12px;color:var(--muted);"><th style="padding:8px 12px;">会場名</th><th>都道府県</th><th>収容人数</th><th>メモ</th></tr></thead><tbody>';
  list.forEach(function(v){
    html+='<tr style="border-top:1px solid var(--border);cursor:pointer;" onclick="openVenueModal(\''+v.id+'\')">'+
      '<td style="padding:8px 12px;"><strong>'+esc(v.name)+'</strong></td>'+
      '<td>'+esc(v.pref||'—')+'</td>'+
      '<td>'+(v.cap?Number(v.cap).toLocaleString()+'人':'—')+'</td>'+
      '<td style="color:var(--muted);font-size:12px;">'+esc(v.note||'—')+'</td></tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('venue-list').innerHTML = html;
}

function openVenueModal(id) {
  ['id','name','pref','cap','note'].forEach(function(f){document.getElementById('venue-'+f).value='';});
  document.getElementById('venue-modal-title').textContent='会場を追加';
  document.getElementById('venue-delete-btn').style.display='none';
  if (id) {
    var v=DB.get('venue').find(function(x){return x.id===id;});
    if(!v) return;
    ['id','name','pref','cap','note'].forEach(function(f){document.getElementById('venue-'+f).value=v[f]||'';});
    document.getElementById('venue-modal-title').textContent='会場を編集';
    document.getElementById('venue-delete-btn').style.display='';
  }
  openModal('modal-venue');
}

function saveVenue() {
  var name=document.getElementById('venue-name').value.trim();
  if(!name){alert('会場名を入力してください');return;}
  var id=document.getElementById('venue-id').value||uuid();
  var obj={id,name,pref:document.getElementById('venue-pref').value.trim(),cap:document.getElementById('venue-cap').value,note:document.getElementById('venue-note').value.trim()};
  var list=DB.get('venue');
  var idx=list.findIndex(function(x){return x.id===id;});
  if(idx>=0)list[idx]=obj;else list.push(obj);
  DB.set('venue',list); closeModal('modal-venue'); renderVenue();
}

function deleteVenue() {
  if(!confirm('この会場を削除しますか？'))return;
  var id=document.getElementById('venue-id').value;
  DB.set('venue',DB.get('venue').filter(function(x){return x.id!==id;}));
  closeModal('modal-venue'); renderVenue();
}

// ===== データ管理 =====
function openDataModal() { openModal('modal-data'); }

function exportData() {
  var data = {
    meigi:     DB.get('meigi'),
    venue:     DB.get('venue'),
    exportedAt: new Date().toISOString(),
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fc_meigi_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.meigi && !data.venue) { alert('正しいデータファイルではありません'); return; }
      if (!confirm('現在のデータをすべて上書きします。よろしいですか？')) return;
      if (data.meigi) DB.set('meigi', data.meigi);
      if (data.venue) DB.set('venue', data.venue);
      alert('インポート完了しました！');
      closeModal('modal-data');
      renderDashboard();
    } catch(e) {
      alert('ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function changePw() {
  var pw = document.getElementById('new-pw').value;
  if (pw.length < 4) { alert('4文字以上で設定してください'); return; }
  localStorage.setItem('pw_hash', await sha256(pw));
  document.getElementById('new-pw').value = '';
  alert('パスワードを変更しました');
}

// ===== 起動 =====
renderDashboard();
